spring.application.name=CrudLang

# MySQL DataSource — values injected via environment variables in production
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Gemini Agent
agent.gemini.api-key=${GEMINI_API_KEY}
agent.gemini.model-name=${GEMINI_MODEL:gemini-2.5-flash-lite}
agent.gemini.temperature=0.7

# Base URL for agent tools (unused — tools call service directly now)
agent.student.api.base-url=http://localhost:8080
